name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: repository checkout
        uses: actions/checkout@v4

      - name: start docker compose unit tests
        run: docker compose up --build --exit-code-from unit_tests unit_tests | tee docker-output_unit.txt

      - name: add output to summary
        run: |

      - name: cleanup
        if: always()
        run: docker compose down -v

  
  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: repository checkout
        uses: actions/checkout@v4

      - name: start docker compose integration tests
        run: docker compose up --build --exit-code-from integration_tests integration_tests | tee docker-output_integration.txt

      - name: cleanup
        if: always()
        run: docker compose down -v

  post-coverage:
    runs-on: ubuntu-latest
    needs: integration_tests
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: 
        uses: actions/checkout@v4
        with:
          fetch-depth: ${{github.event_name == 'pull_request' && 2 || 0}}

      - name: get changed files
        id: changed-files
        run: |
          if ${{github.event_name == 'pull_request'}}; then
            changed_files=$(git diff --name-only HEAD^1 HEAD | xargs)
          else
            changed_files=$(git diff --name-only ${{github.event.before}} ${{github.event.after}} | xargs)
          fi

      - name: get coverage 
        run: |
          grep -E Name docker-output_unit.txt > coverage.txt
          for file in ${{steps.changed-files.output.changed_files}}; do
            grep -E $file docker-output_unit.txt >> coverage.txt
          done
          grep -E TOTAL docker-output_unit.txt >> coverage.txt
          printf '\n' >> coverage.txt
          grep -E Name docker-output_integration.txt >> coverage.txt
          for file in ${{steps.changed-files.output.changed_files}}; do
            grep -E $file docker-output_integration.txt >> coverage.txt
          done
          grep -E TOTAL docker-output_integration.txt >> coverage.txt

      - name: create pr comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = request("fs")
            const body = fs.readFileSync("context.txt", "utf8")

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: contex.repo.repo,
              body: body
            })
