name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: repository checkout
        uses: actions/checkout@v4

      - name: start docker compose unit tests
        run: docker compose up --build --exit-code-from unit_tests unit_tests | tee docker-output_unit.txt

      - name: add output to summary
        run: |
          echo "## docker unit tests output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat docker-output_unit.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: cleanup
        if: always()
        run: docker compose down -v

  
  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: repository checkout
        uses: actions/checkout@v4

      - name: start docker compose integration tests
        run: docker compose up --build --exit-code-from integration_tests integration_tests | tee docker-output_integration.txt

      - name: add output to summary
        run: |
          echo "## docker integration tests output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat docker-output_integration.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: cleanup
        if: always()
        run: docker compose down -v
